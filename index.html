<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Message Box</h2>

        <p class="limit-text">Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        <textarea
            id="message"
            placeholder="Type your message here..."
            maxlength="200">
        </textarea>

        <div class="counter">
            <span id="count">0</span>/200 characters
        </div>

        <div id="warning"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
